services:
  - type: web
    name: fairrelay-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BRAIN_URL
        value: https://fairrelay-brain-gdm1.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: CORS_ORIGINS
        value: "https://fairrelay.vercel.app,https://logisticsnow.in,https://app.lorri.in,http://localhost:5173"
